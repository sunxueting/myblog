  }
  window.onerror=function(m,s,l,c,e){__errors.push({msg:m,src:s,line:l,col:c,error:e?e.stack:null});showError("JS 运行时错误: "+m,{位置:s+" 第"+l+"行, 列"+c,堆栈:e?e.stack:"无"});return false};
  window.addEventListener('error',function(e){if(e.target&&e.target.tagName){var t=e.target;var tag=t.tagName,src=t.src||t.href||"";__errors.push("资源加载失败: "+tag+" "+src);showError("资源加载失败: "+tag,{地址:src,类型:t.type||"未知"});}},true);
  window.addEventListener('unhandledrejection',function(e){__errors.push("未处理的Promise错误: "+e.reason);showError("Promise 错误",{原因:String(e.reason)});});

</script>

    function safeLS(fn,fallback){try{return fn()}catch(e){console.warn("localStorage issue:",e.message);return fallback}}
    function loadData(){return safeLS(function(){var s=localStorage.getItem(STORAGE_KEY);return s?JSON.parse(s):null},null)||JSON.parse(JSON.stringify(D))}
    console.log("[Data] safeLS + loadData defined");
    
    // ===== Cloud Publish (GitHub API) =====
    function getGHSettings(){return safeLS(function(){var s=localStorage.getItem("blog_gh_settings");return s?JSON.parse(s):null},{})||{token:"",owner:"",repo:"",branch:"main"}}
    function saveGHSettings(cfg){safeLS(function(){localStorage.setItem("blog_gh_settings",JSON.stringify(cfg))},null)}
    function publishDataToCloud(data,cfg,callback){
      var content="var __BLOG_DATA = "+JSON.stringify(data)+";";
      var b64=btoa(unescape(encodeURIComponent(content)));
      var url="https://api.github.com/repos/"+cfg.owner+"/"+cfg.repo+"/contents/data.js";
      // First get the file SHA
      fetch(url,{headers:{Authorization:"Bearer "+cfg.token,"Accept":"application/vnd.github+json"}})
        .then(function(r){if(!r.ok)throw new Error("获取文件信息失败: "+r.status);return r.json()})
        .then(function(fileInfo){
          return fetch(url,{
            method:"PUT",
            headers:{Authorization:"Bearer "+cfg.token,"Accept":"application/vnd.github+json","Content-Type":"application/json"},
            body:JSON.stringify({message:"Update blog data via admin panel",content:b64,sha:fileInfo.sha,branch:cfg.branch})
          });
        })
        .then(function(r){if(!r.ok)throw new Error("发布失败: "+r.status);return r.json()})
        .then(function(result){callback(null,result)})
        .catch(function(err){callback(err.message,null)});
    }
    console.log("[Data] publishDataToCloud defined");

    // Update diag

      var rd=document.getElementById("diag-dom2");
      var rb=document.getElementById("diag-babel2");

          </div>
          <p className="text-xs text-stone-400 mt-1">需要 <code className="bg-stone-100 px-1 rounded">contents:write</code> 权限。Token 仅保存在此浏览器中。</p>
        </Row>
        <Row label="GitHub 仓库所有者"><input value={getGHSettings().owner} onChange={e=>{var c=getGHSettings();c.owner=e.target.value;saveGHSettings(c)}} className="w-full border border-stone-200 rounded-lg px-3 py-2 text-sm" placeholder="你的 GitHub 用户名"/></Row>
        <Row label="仓库名称"><input value={getGHSettings().repo} onChange={e=>{var c=getGHSettings();c.repo=e.target.value;saveGHSettings(c)}} className="w-full border border-stone-200 rounded-lg px-3 py-2 text-sm" placeholder="my-blog"/></Row>
        <Row label="分支"><input value={getGHSettings().branch||"main"} onChange={e=>{var c=getGHSettings();c.branch=e.target.value;saveGHSettings(c)}} className="w-40 border border-stone-200 rounded-lg px-3 py-2 text-sm" placeholder="main"/></Row>
        <p className="text-xs text-stone-400 mt-2">💡 使用流程：编辑内容 → 点击顶部「🚀 发布到云端」→ 等待约 30 秒 → 刷新网站即可看到更新。</p>
      </Section>
      
            </div>
      {toast&&<div className="fixed top-4 right-4 z-[100] bg-emerald-600 text-white text-sm px-4 py-2 rounded-lg shadow-lg animate-fade-in">{toast}</div>}

  );

  // ===== PUBLIC VIEW =====

  if(view==="article"&&viewArticle){

    return(<div className="min-h-screen bg-[#faf6f0]">

      {/* ===== TIMELINE ===== */}
      <section id="timeline" className="w-full py-16 sm:py-20">
        <div className="w-full px-6 sm:px-10 lg:px-16 xl:px-24">
          <div className="max-w-7xl">
            <div className="flex items-center gap-3 mb-8">{I.ScrollText("w-5 h-5 text-amber-600")}<h2 className="font-serif text-2xl sm:text-3xl text-stone-800">行动与财富日志</h2></div>
            <div className="relative">
              <div className="absolute left-[19px] sm:left-[21px] top-0 bottom-0 w-0.5 bg-amber-200/70"/>
              <div className="space-y-10">
                {d.timeline.map((item,idx)=>(
                  <div key={idx} className="relative pl-12 sm:pl-14">
                    <div className={"absolute left-2.5 sm:left-3 top-1 w-4 h-4 rounded-full border-2 border-white shadow-sm "+(item.type==="finance"?"bg-amber-500":"bg-emerald-500")}/>
                    <div onClick={()=>{if(item.link)window.open(item.link,"_blank")}} className={"bg-white rounded-xl border border-stone-200/60 p-5 sm:p-6 hover:shadow-sm transition-all "+(item.link?"cursor-pointer hover:border-amber-200/60":"")}>
                      <div className="flex items-start justify-between gap-4 flex-wrap">
                        <div><span className={"inline-block text-xs font-medium px-2 py-0.5 rounded-full mb-2 "+(item.type==="finance"?"bg-amber-50 text-amber-700":"bg-emerald-50 text-emerald-700")}>{item.type==="finance"?"💰 财务决策":"🛠️ 副业尝试"}</span>
                          <h3 className="font-serif text-base sm:text-lg text-stone-800">{item.title}</h3></div>
                        <span className="text-xs text-stone-400 whitespace-nowrap">{item.date}</span>
                      </div>
                      <p className="mt-2 text-sm text-stone-500 leading-relaxed">{item.desc}</p>
                      {item.link&&<span className="mt-2 inline-flex items-center gap-1 text-xs text-amber-600">{I.ExternalLink("w-3 h-3")}查看详情</span>}

              </div>
            </div>
          </div>
        </div>
      </section>

      {/* ===== THOUGHTS ===== */}
      <section id="thoughts" className="w-full py-16 sm:py-20 bg-white/40">
        <div className="w-full px-6 sm:px-10 lg:px-16 xl:px-24">
          <div className="max-w-7xl">
            <div className="flex items-center gap-3 mb-8">{I.Coffee("w-5 h-5 text-amber-600")}<h2 className="font-serif text-2xl sm:text-3xl text-stone-800">夹心层碎碎念</h2></div>
            <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-5 sm:gap-6">
              {d.thoughts.map((item,idx)=>(
                <div key={idx} className="bg-white rounded-xl border border-stone-200/40 p-5 sm:p-6 hover:shadow-sm hover:border-amber-200/60 transition-all duration-300">
                  <div className="flex items-center gap-2 mb-3">
                    <div className="w-8 h-8 rounded-full bg-amber-50 flex items-center justify-center">{I[item.icon]?I[item.icon]("w-4 h-4 text-amber-600"):I.Lightbulb("w-4 h-4 text-amber-600")}</div>
                    <span className="text-xs text-stone-400">{item.tag}</span></div>
                  <p className="text-sm text-stone-600 leading-relaxed italic">{item.text}</p>
                  <div className="mt-4 flex items-center gap-2 text-xs text-stone-400">{I.Calendar("w-3 h-3")}<span>{item.date}</span></div>

              <div className="flex flex-wrap gap-3">
                {d.tools.map((tool,idx)=>(
                  <span key={idx} onClick={()=>{if(tool.url)window.open(tool.url,"_blank")}}
                    className={"inline-flex items-center gap-1.5 bg-white border border-stone-200/60 rounded-full px-3.5 py-1.5 text-xs text-stone-600 transition-colors "+(tool.url?"hover:border-amber-300 hover:text-amber-700 cursor-pointer":"")}>

              </div>
            </div>
          </div>
        </div>
      </section>

      {/* ===== FOOTER ===== */}
      <footer className="w-full bg-stone-800 text-stone-400 py-12">
        <div className="w-full px-6 sm:px-10 lg:px-16 xl:px-24 text-center">
          <div className="font-serif text-lg text-stone-300 mb-2">{d.settings.blogTitle}</div>
          <p className="text-xs text-stone-500 max-w-md mx-auto leading-relaxed">{d.settings.footer}</p>
          <div className="mt-4 flex items-center justify-center gap-4 text-xs text-stone-500">
            <span>{'©'} 2026 {d.settings.blogTitle}</span><span className="w-px h-3 bg-stone-600"/><span>Made with {'♥'} and {'☕'}</span>

      <button onClick={()=>setAdmin(true)} className="fixed bottom-6 right-6 z-40 w-10 h-10 rounded-full bg-white border border-stone-300 shadow-md flex items-center justify-center text-stone-400 hover:text-amber-700 hover:border-amber-400 transition-all" title="管理后台">{I.Settings("w-4 h-4")}</button>

      {toast&&<div className="fixed top-4 right-4 z-[100] bg-emerald-600 text-white text-sm px-4 py-2 rounded-lg shadow-lg animate-fade-in">{toast}</div>}
    </div>
  );
}

// ===== ADMIN COMPONENTS =====
function Section({title,children}){return(<div className="bg-white rounded-2xl border border-stone-200/60 p-5 sm:p-6"><h3 className="font-serif text-base text-stone-700 mb-4 pb-3 border-b border-stone-100">{title}</h3><div className="space-y-4">{children}</div></div>)}
function Row({label,children}){return(<div><label className="block text-xs text-stone-500 mb-1.5">{label}</label>{children}</div>)}

// ===== MOUNT =====
(function(){
var diag=document.getElementById("root");
var steps=[];
function log(s){steps.push(s);console.log("[Mount] "+s);}
try {
  log("Step0: React="+typeof React+", ReactDOM="+typeof ReactDOM+", Babel="+typeof Babel);
  log("Step1: React.version="+(typeof React!=="undefined"?React.version:"N/A"));

  // Check key variables exist
  if(typeof STORAGE_KEY==="undefined"){log("WARN: STORAGE_KEY undefined");}
  if(typeof D==="undefined"){log("WARN: D undefined");}
  if(typeof safeLS==="undefined"){log("WARN: safeLS undefined");}
  if(typeof loadData==="undefined"){log("WARN: loadData undefined");}
  if(typeof App==="undefined"){log("WARN: App undefined");}

  log("Step2: Calling loadData...");
  var testData;
  try{testData=loadData();log("Step3: loadData OK, got "+JSON.stringify(testData).substring(0,50));}
  catch(le){log("Step3 FAIL: loadData error: "+le.message);throw le;}

  log("Step4: Creating root...");
  var mountEl=document.getElementById("root");
  if(!mountEl)throw new Error("找不到 #root 元素!");
  if(typeof ReactDOM==="undefined")throw new Error("ReactDOM 未加载!");
  if(typeof ReactDOM.createRoot!=="function")throw new Error("ReactDOM.createRoot 不存在!");

  var root=ReactDOM.createRoot(mountEl);
  log("Step5: Rendering App...");
  root.render(<App />);
  log("Step6: Render OK!");
} catch(e) {
  log("FATAL: "+e.message+"\n"+e.stack);
  diag.innerHTML='<div style="padding:40px;text-align:left;font-family:monospace;max-width:700px;margin:0 auto"><h2 style="color:#c0392b;font-family:sans-serif">React 渲染失败</h2><pre style="font-size:13px;line-height:1.6;white-space:pre-wrap;background:#fff3f3;padding:16px;border-radius:8px;border:1px solid #fcc">'+e.message+'\n\n'+e.stack+'</pre><pre style="font-size:11px;color:#888;margin-top:16px;white-space:pre-wrap;background:#f9f9f9;padding:12px;border-radius:8px">Steps:\n'+steps.join("\n")+'</pre><p style="font-size:12px;color:#999;margin-top:16px">请运行: python3 -m http.server 8080</p></div>';
}
})();
</script>
</body>
</html>
